apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hiclaw.secretName" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $existingSecret := (lookup "v1" "Secret" (include "hiclaw.namespace" .) (include "hiclaw.secretName" .)) }}
  {{- if .Values.credentials.registrationToken }}
  HICLAW_REGISTRATION_TOKEN: {{ .Values.credentials.registrationToken | quote }}
  HICLAW_MATRIX_REGISTRATION_TOKEN: {{ .Values.credentials.registrationToken | quote }}
  {{- else if and $existingSecret $existingSecret.data (index $existingSecret.data "HICLAW_REGISTRATION_TOKEN") }}
  HICLAW_REGISTRATION_TOKEN: {{ index $existingSecret.data "HICLAW_REGISTRATION_TOKEN" | b64dec | quote }}
  HICLAW_MATRIX_REGISTRATION_TOKEN: {{ index $existingSecret.data "HICLAW_REGISTRATION_TOKEN" | b64dec | quote }}
  {{- else }}
  {{- $token := randAlphaNum 32 }}
  HICLAW_REGISTRATION_TOKEN: {{ $token | quote }}
  HICLAW_MATRIX_REGISTRATION_TOKEN: {{ $token | quote }}
  {{- end }}
  HICLAW_ADMIN_USER: {{ .Values.credentials.adminUser | quote }}
  {{- if .Values.credentials.adminPassword }}
  HICLAW_ADMIN_PASSWORD: {{ .Values.credentials.adminPassword | quote }}
  {{- else if and $existingSecret $existingSecret.data (index $existingSecret.data "HICLAW_ADMIN_PASSWORD") }}
  HICLAW_ADMIN_PASSWORD: {{ index $existingSecret.data "HICLAW_ADMIN_PASSWORD" | b64dec | quote }}
  {{- else }}
  HICLAW_ADMIN_PASSWORD: {{ randAlphaNum 16 | quote }}
  {{- end }}
  HICLAW_LLM_API_KEY: {{ required "credentials.llmApiKey is required" .Values.credentials.llmApiKey | quote }}
  HICLAW_LLM_PROVIDER: {{ .Values.credentials.llmProvider | quote }}
  HICLAW_DEFAULT_MODEL: {{ .Values.credentials.defaultModel | quote }}
  {{- if .Values.credentials.llmBaseUrl }}
  HICLAW_OPENAI_BASE_URL: {{ .Values.credentials.llmBaseUrl | quote }}
  {{- end }}
  {{- /*
  Matrix AppService tokens.

  The controller defaults to AppService mode (HICLAW_MATRIX_APPSERVICE_ENABLED
  is true unless explicitly disabled) and panics at startup when the
  as_token / hs_token are absent. The install script generates these once
  and persists them to the env file; mirror that here so a default Helm
  install does not crash-loop the controller.

  Resolution order (per token):
    1. values override (matrix.appservice.asToken / hsToken)
    2. existing Secret value (preserved across upgrades)
    3. generated randAlphaNum 64  (opaque random string (install script uses `openssl rand -hex 32`))

  Generated tokens are stable across `helm upgrade` because case 2 re-reads
  the previously rendered Secret — the same lookup-preserve pattern used for
  the registration token above.
  */ -}}
  HICLAW_MATRIX_APPSERVICE_ENABLED: {{ .Values.matrix.appservice.enabled | toString | quote }}
  {{- if .Values.matrix.appservice.asToken }}
  HICLAW_MATRIX_APPSERVICE_AS_TOKEN: {{ .Values.matrix.appservice.asToken | quote }}
  {{- else if and $existingSecret $existingSecret.data (index $existingSecret.data "HICLAW_MATRIX_APPSERVICE_AS_TOKEN") }}
  HICLAW_MATRIX_APPSERVICE_AS_TOKEN: {{ index $existingSecret.data "HICLAW_MATRIX_APPSERVICE_AS_TOKEN" | b64dec | quote }}
  {{- else }}
  HICLAW_MATRIX_APPSERVICE_AS_TOKEN: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{- if .Values.matrix.appservice.hsToken }}
  HICLAW_MATRIX_APPSERVICE_HS_TOKEN: {{ .Values.matrix.appservice.hsToken | quote }}
  {{- else if and $existingSecret $existingSecret.data (index $existingSecret.data "HICLAW_MATRIX_APPSERVICE_HS_TOKEN") }}
  HICLAW_MATRIX_APPSERVICE_HS_TOKEN: {{ index $existingSecret.data "HICLAW_MATRIX_APPSERVICE_HS_TOKEN" | b64dec | quote }}
  {{- else }}
  HICLAW_MATRIX_APPSERVICE_HS_TOKEN: {{ randAlphaNum 64 | quote }}
  {{- end }}
